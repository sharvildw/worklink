<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - WorkLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-briefcase"></i>
                WorkLink
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="marketplace-jobs.html">Find Jobs</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="avatar avatar-large bg-white text-success me-3" id="workerAvatar">W</div>
                            <div>
                                <h4 class="mb-1" id="workerName">Welcome back!</h4>
                                <p class="mb-0" id="workerEmail">worker@example.com</p>
                            </div>
                            <div class="ms-auto">
                                <span class="badge bg-light text-dark p-3" id="availabilityBadge">
                                    <i class="fas fa-circle text-success me-1"></i>Available
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-number" id="completedJobs">0</div>
                    <div class="stat-label">Completed Jobs</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-number" id="pendingApplications">0</div>
                    <div class="stat-label">Pending Applications</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                    <div class="stat-icon"><i class="fas fa-star"></i></div>
                    <div class="stat-number" id="workerRating">0.0</div>
                    <div class="stat-label">Rating</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                    <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                    <div class="stat-number" id="totalEarnings">0</div>
                    <div class="stat-label">Total Earnings</div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="workerTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="applied-tab" data-bs-toggle="tab" data-bs-target="#applied" type="button">
                    <i class="fas fa-paper-plane me-2"></i>Applied Jobs
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="available-tab" data-bs-toggle="tab" data-bs-target="#available" type="button">
                    <i class="fas fa-briefcase me-2"></i>Available Jobs
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button">
                    <i class="fas fa-history me-2"></i>Work History
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button">
                    <i class="fas fa-user me-2"></i>My Profile
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="applied" role="tabpanel">
                <div class="row g-4" id="appliedJobsContainer"></div>
            </div>
            <div class="tab-pane fade" id="available" role="tabpanel">
                <div class="row g-4" id="availableJobsContainer"></div>
            </div>
            <div class="tab-pane fade" id="history" role="tabpanel">
                <div class="row g-4" id="workHistoryContainer"></div>
            </div>
            <div class="tab-pane fade" id="profile" role="tabpanel">
                <div class="card">
                    <div class="card-body p-4">
                        <h5 class="mb-4">Worker Profile</h5>
                        <form onsubmit="updateWorkerProfile(event)">
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Name</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="profileName" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Skills</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="profileSkills" placeholder="e.g., Electrician, Plumber, Painter">
                                    <div class="form-text">Separate skills with commas</div>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Experience</label>
                                <div class="col-sm-9">
                                    <select class="form-select" id="profileExperience">
                                        <option value="0">Fresher</option>
                                        <option value="1">1 year</option>
                                        <option value="2">2 years</option>
                                        <option value="3">3 years</option>
                                        <option value="4">4 years</option>
                                        <option value="5">5 years</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Hourly Rate (INR)</label>
                                <div class="col-sm-9">
                                    <input type="number" class="form-control" id="profileRate" placeholder="e.g., 300">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Location</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="profileLocation" placeholder="Your city">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Availability</label>
                                <div class="col-sm-9">
                                    <select class="form-select" id="profileAvailability">
                                        <option value="available">Available for work</option>
                                        <option value="busy">Currently busy</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">About Me</label>
                                <div class="col-sm-9">
                                    <textarea class="form-control" id="profileAbout" rows="4" placeholder="Tell employers about yourself and your experience..."></textarea>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label">Portfolio Titles</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="profilePortfolio" placeholder="Fan repair, Home wiring, Bathroom fitting">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-9 offset-sm-3">
                                    <button type="submit" class="btn btn-success">Update Profile</button>
                                </div>
                            </div>
                        </form>

                        <hr class="my-4">
                        <h6 class="mb-3">Account Actions</h6>
                        <button class="btn btn-outline-danger" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api-proxy.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
