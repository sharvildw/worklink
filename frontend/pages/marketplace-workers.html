<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Workers - WorkLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-briefcase"></i> WorkLink</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="marketplace-workers.html">Find Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="marketplace-jobs.html">Find Jobs</a></li>
                    <li class="nav-item"><a class="nav-link" href="post-job.html">Post Job</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="search-section">
            <div class="row g-3">
                <div class="col-md-5"><input type="text" class="form-control search-input" id="searchQuery" placeholder="Search by name or skill..."></div>
                <div class="col-md-3"><input type="text" class="form-control search-input" id="locationFilter" placeholder="Location"></div>
                <div class="col-md-2">
                    <select class="form-select search-input" id="skillFilter">
                        <option value="">All Skills</option>
                        <option value="Electrician">Electrician</option>
                        <option value="Plumber">Plumber</option>
                        <option value="Painter">Painter</option>
                        <option value="Carpenter">Carpenter</option>
                    </select>
                </div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="searchWorkers()"><i class="fas fa-search me-2"></i>Search</button></div>
            </div>
        </div>
        <div class="row g-4" id="workersGrid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/marketplace.js"></script>
</body>
</html>
