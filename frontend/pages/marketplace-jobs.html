<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs - WorkLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-briefcase"></i>
                WorkLink
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="marketplace-workers.html">Find Workers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="marketplace-jobs.html">Find Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="post-job.html">Post Job</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Search Section -->
        <div class="search-section">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control search-input" id="searchQuery" placeholder="Search jobs...">
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control search-input" id="locationFilter" placeholder="Location">
                </div>
                <div class="col-md-3">
                    <select class="form-select search-input" id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Electrician">Electrician</option>
                        <option value="Plumber">Plumber</option>
                        <option value="Painter">Painter</option>
                        <option value="Carpenter">Carpenter</option>
                        <option value="Mason">Mason</option>
                        <option value="Gardener">Gardener</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="searchJobs()">
                        <i class="fas fa-search me-2"></i>Search
                    </button>
                </div>
            </div>
        </div>

        <!-- Jobs Grid -->
        <div class="row g-4" id="jobsGrid">
            <!-- Jobs will be loaded here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api-proxy.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/marketplace.js"></script>
</body>
</html>
