<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - WorkLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-briefcase"></i> WorkLink</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="marketplace-workers.html">Find Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="marketplace-jobs.html">Find Jobs</a></li>
                    <li class="nav-item"><a class="nav-link active" href="post-job.html">Post Job</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">Post a New Job</h3>
                        <form onsubmit="postJob(event)">
                            <div class="mb-3"><label for="jobTitle" class="form-label">Job Title</label><input type="text" class="form-control" id="jobTitle" required></div>
                            <div class="mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select" id="category" required>
                                    <option value="">Select Category</option>
                                    <option value="Electrician">Electrician</option>
                                    <option value="Plumber">Plumber</option>
                                    <option value="Painter">Painter</option>
                                    <option value="Carpenter">Carpenter</option>
                                    <option value="Mason">Mason</option>
                                    <option value="Gardener">Gardener</option>
                                    <option value="Cleaner">Cleaner</option>
                                    <option value="Driver">Driver</option>
                                </select>
                            </div>
                            <div class="mb-3"><label for="location" class="form-label">Location</label><input type="text" class="form-control" id="location" required></div>
                            <div class="row mb-3">
                                <div class="col-md-6"><label for="budget" class="form-label">Budget</label><input type="number" class="form-control" id="budget"></div>
                                <div class="col-md-6">
                                    <label for="duration" class="form-label">Duration</label>
                                    <select class="form-select" id="duration">
                                        <option value="">Select duration</option>
                                        <option value="1 day">1 day</option>
                                        <option value="2-3 days">2-3 days</option>
                                        <option value="1 week">1 week</option>
                                        <option value="2 weeks">2 weeks</option>
                                        <option value="1 month">1 month</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3"><label for="description" class="form-label">Description</label><textarea class="form-control" id="description" rows="5" required></textarea></div>
                            <div class="mb-3"><label for="requirements" class="form-label">Requirements</label><textarea class="form-control" id="requirements" rows="3"></textarea></div>
                            <div class="mb-3"><label for="contactPhone" class="form-label">Contact Phone</label><input type="tel" class="form-control" id="contactPhone"></div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">I confirm this job posting follows WorkLink guidelines.</label>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg" type="submit">Post Job</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="window.history.back()">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/post-job.js"></script>
</body>
</html>
